<canvas width="600" height="400"></canvas>

<script>
    var pantalla = document.querySelector('canvas');
    var pincel = pantalla.getContext('2d');
    var x = 0;
    var y = 0;
    var puedoDibujar = false;
    var colores =["red","green","blue","white"];
    var colorActual = "blue";


    function dibujarLienzo(x, y, color) {
   
    pincel.fillStyle = '#222'
    pincel.fillRect(0, 0, 600, 400);
// 2. Configuramos el MARGEN (borde)
    pincel.strokeStyle = "yellow";
    pincel.lineWidth = 10; // <--- AQUÍ defines el grosor (ejemplo: 10 píxeles)
    pincel.strokeRect(0, 0, 600, 400);
    
}

   function dibujarCuadrado(x, y, color) {
    pincel.fillStyle = color;
    pincel.fillRect(x, y, 50, 50);
    pincel.strokeStyle = "black";
    pincel.lineWidth = 2;
    pincel.strokeRect(x, y, 50, 50);
}


function dibujarPaleta() {
    dibujarCuadrado(0, 0, colores[0]);
    dibujarCuadrado(50, 0, colores[1]);
    dibujarCuadrado(100, 0, colores[2]);
    dibujarCuadrado(150, 0, colores[3]);
}
  

function dibujarCirculo(evento) {
    if(puedoDibujar) {
        var x = evento.pageX - pantalla.offsetLeft;
        var y = evento.pageY - pantalla.offsetTop;
        if (y > 55) { 
            pincel.fillStyle = colorActual;
            pincel.beginPath();
            pincel.arc(x, y, 5, 0, 2 * Math.PI);
            pincel.fill();
        }
    }
}


function seleccionarColor(evento) {
    // Calculamos las coordenadas una sola vez
    var x = evento.pageX - pantalla.offsetLeft;
    var y = evento.pageY - pantalla.offsetTop;

    if (y < 50) { 
        if (x < 50) colorActual = colores[0];
        else if (x < 100) colorActual = colores[1];
        else if (x < 150) colorActual = colores[2];
        else if (x < 200) limpiarPantalla();
        // Tip: Podríamos imprimir en consola para confirmar
        console.log("Color cambiado a: " + colorActual);
    }
}


  function limpiarPantalla(){

        pincel.clearRect(0,0,600,400); 
        dibujarLienzo();
        dibujarPaleta();
}


    function habilitarDibujar() { 
     puedoDibujar = true;  
 }
    function deshabilitarDibujar() { 
     puedoDibujar = false; 
 }

    dibujarLienzo();
    dibujarPaleta();

    pantalla.onmousemove = dibujarCirculo;//¡Se están desplazando!"

   pantalla.onmousedown = function(evento) { 
    habilitarDibujar();       // Acción 1 (Sin datos)
    seleccionarColor(evento);  // Acción 2 (Con datos del mensajero)
}

    pantalla.onmouseup = deshabilitarDibujar; //¡Ya lo soltaron!"

</script>
