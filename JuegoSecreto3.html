<meta charset =UTF-8>
<input/>
<button> Verificar si acerto con el número secreto </button>
<script>

	var secretos = []; 
	var input= document.querySelector("input"); 
	input.focus();

	function aleatorio(){
		return Math.round(Math.random()*10);
	}


	function sortearNumeros(cantidadInteraciones){
		var contador = 1; 
		var arregloSecretos = []; 

		while (contador<=cantidadInteraciones){
			var numeroAleatorio = aleatorio();
			console.log(numeroAleatorio);
			var encontrado=false; 

             //valida si hay numeros repetidos y que no sea cero 
			if (numeroAleatorio !=0){
				for (var posicion = 0; posicion < arregloSecretos.length; posicion++){
					if(numeroAleatorio ==arregloSecretos[posicion]){
						encontrado = true;
						break; 
					}
				}
                //sino hay numeros repetidos ingresa el numero al arreglo 
				if (encontrado == false){
					arregloSecretos.push(numeroAleatorio); 
					contador++;
				}
				
			}
		}
		return arregloSecretos; 
	}
	
	var secretos = sortearNumeros(4); 
	console.log(secretos);

	//secretos.push(aleatorio());
	//secretos.push(aleatorio());
	//secretos.push(aleatorio());
	//secretos.push(aleatorio()); 
	//secretos.push(Math.roud(Math.random()*10));
	//secretos.push(Math.roud(Math.random()*10)); 

	 

	function verificar(){
		var encontrado = false;
		for (var posicionArreglo = 0; posicionArreglo < secretos.length; posicionArreglo++){
			if (parseInt(input.value) == secretos[posicionArreglo]){

				alert ("Usted acerto"); 
				encontrado=true; 
				break;
			}
		}
		if (encontrado==false){
			alert("Usted erro"); 
		}

		input.value = "";
		input.focus();
	}
	var button=document.querySelector("button");
	button.onclick=verificar;

</script>
